services:
  juji-discord-bot:
    image: ${IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      lavalink:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - .env
    pull_policy: always
    networks:
      - juji-network

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: juji
      POSTGRES_USER: ${POSTGRES_USER:-juji}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-juji}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-juji} -d juji']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - juji-network

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    pull_policy: always
    networks:
      - juji-network

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4-alpine
    restart: unless-stopped
    pull_policy: always
    environment:
      - _JAVA_OPTIONS=-Xmx512m
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
    volumes:
      - ./application.yml:/opt/Lavalink/application.yml:ro
    networks:
      - juji-network

volumes:
  pgdata:

networks:
  juji-network:
    external: true
